<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#080810;--surface:#111120;--surface2:#16162a;--border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);--cyan:#00e5ff;--violet:#9d6fff;--white:#f0f0f8;
  --muted:rgba(240,240,248,0.5);--red:#ff5252;--green:#00e676;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:var(--black);color:var(--white);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:40px 20px;
  background-image:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(157,111,255,0.05) 0%,transparent 70%);}
.box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:56px 48px;width:100%;max-width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
.logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;text-align:center;margin-bottom:6px;}
.logo span{color:var(--cyan);}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:40px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;display:block;margin-bottom:7px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
  padding:13px 16px;color:var(--white);font-family:'Syne',sans-serif;font-size:14px;
  outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--cyan);}
.form-input::placeholder{color:var(--muted);}
.btn{width:100%;padding:15px;background:var(--cyan);color:var(--black);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:all 0.3s;margin-top:6px;}
.btn:hover{box-shadow:0 0 30px rgba(0,229,255,0.3);transform:translateY(-2px);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border2);}
.divider::before{left:0;}.divider::after{right:0;}
.btn-link{width:100%;padding:13px;background:transparent;border:1px solid var(--border2);
  border-radius:10px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;
  cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center;}
.btn-link:hover{border-color:var(--violet);color:var(--violet);}
.msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:14px;display:none;}
.msg.error{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:var(--red);}
.msg.success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green);}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Nexo<span>ra</span></div>
  <div class="sub">Connectez-vous à votre espace</div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" id="email" type="email" placeholder="vous@entreprise.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input class="form-input" id="password" type="password" placeholder="Votre mot de passe" onkeydown="if(event.key==='Enter')login()">
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Se connecter →</button>

  <div class="divider">ou</div>
  <a class="btn-link" href="/register">Créer un compte gratuitement</a>

  <div class="msg" id="msgBox"></div>
</div>

<script>
// Redirect si déjà connecté
if (localStorage.getItem("nexora_token")) window.location.href = "/dashboard";

async function login() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn      = document.getElementById("loginBtn");

  if (!email || !password) { showMsg("Remplissez tous les champs.", "error"); return; }

  btn.disabled = true; btn.textContent = "Connexion...";

  try {
    const res  = await fetch("/auth/login", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("nexora_token",     data.token);
      localStorage.setItem("nexora_client_id", data.client_id);
      localStorage.setItem("nexora_company",   data.company);
      showMsg("Connexion réussie ! Redirection...", "success");
      setTimeout(() => window.location.href = "/dashboard", 800);
    } else {
      showMsg(data.error || "Identifiants incorrects.", "error");
      btn.disabled = false; btn.textContent = "Se connecter →";
    }
  } catch(e) {
    showMsg("Erreur de connexion au serveur.", "error");
    btn.disabled = false; btn.textContent = "Se connecter →";
  }
}

function showMsg(text, type) {
  const box = document.getElementById("msgBox");
  box.textContent = text; box.className = `msg ${type}`; box.style.display = "block";
}
</script>
</body>
</html>
